name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 克隆前端壳项目至当前子目录下
      - name: Checkout Tauri App
        uses: actions/checkout@v4
        with:
          path: feedback-classifier-tauri

      # 2. 克隆后端 Express 兄弟项目至同级子目录下 (编译 sidecar 依赖此同级路径)
      - name: Checkout Express Backend
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/feedback-classifier
          token: ${{ secrets.GH_PAT || github.token }}
          path: feedback-classifier

      # 3. 安装 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. 安装 Bun 环境 (用于编译 sidecar)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 5. 安装 Rust 构建环境
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      # 6. 安装前端依赖
      - name: Install Dependencies
        working-directory: ./feedback-classifier-tauri
        run: npm install

      # 7. 编译 Windows 的 sidecar 二进制程序
      - name: Build Sidecar
        working-directory: ./feedback-classifier-tauri
        run: npm run build:sidecar

      # 8. 编译并打包 Tauri 安装包
      - name: Build Tauri App
        working-directory: ./feedback-classifier-tauri
        run: npm run tauri build

      # 9. 导出安装包工件 (Artifact) 供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: feedback-classifier-windows
          path: feedback-classifier-tauri/src-tauri/target/release/bundle/nsis/*.exe
